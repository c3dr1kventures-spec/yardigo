<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>YardiGo – Buurtverkoop Cluster Icon Preview</title>
<style>
  body { font-family: Poppins, Arial, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card { background: white; border-radius: 20px; padding: 48px 64px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); display: flex; flex-direction: column; align-items: center; gap: 32px; }
  h2 { margin: 0; color: #222; font-size: 20px; }
  .row { display: flex; gap: 60px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .bg { background: #fff9f5; border: 1.5px solid #ffe0cc; border-radius: 14px; padding: 20px; }
  label { font-size: 13px; color: #999; }
  .map-sim { background: #e0eedc; border-radius: 12px; padding: 30px 40px; display: flex; gap: 30px; align-items: flex-end; }
</style>
</head>
<body>
<div class="card">
  <h2>Buurtverkoop Cluster Icon — YardiGo</h2>
  <div class="row">
    <div class="col">
      <div class="bg">
        <svg width="48" height="51" viewBox="0 0 48 51" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Linker pin -->
          <g transform="translate(24,36) rotate(-22) translate(-12,-31)" opacity="0.92">
            <path d="M12 1C7.03 1 3 5.03 3 10C3 17 12 31 12 31C12 31 21 17 21 10C21 5.03 16.97 1 12 1Z" fill="#E07B39" stroke="white" stroke-width="2"/>
            <circle cx="12" cy="10" r="3.6" fill="white"/>
          </g>
          <!-- Rechter pin -->
          <g transform="translate(24,36) rotate(22) translate(-12,-31)" opacity="0.92">
            <path d="M12 1C7.03 1 3 5.03 3 10C3 17 12 31 12 31C12 31 21 17 21 10C21 5.03 16.97 1 12 1Z" fill="#E07B39" stroke="white" stroke-width="2"/>
            <circle cx="12" cy="10" r="3.6" fill="white"/>
          </g>
          <!-- Middelste pin (vooraan) -->
          <g transform="translate(12,5)">
            <path d="M12 1C7.03 1 3 5.03 3 10C3 17 12 31 12 31C12 31 21 17 21 10C21 5.03 16.97 1 12 1Z" fill="#E07B39" stroke="white" stroke-width="2.2"/>
            <circle cx="12" cy="10" r="4" fill="white"/>
          </g>
          <!-- Badge -->
          <rect x="14" y="37" width="20" height="13" rx="6" fill="#E07B39" stroke="white" stroke-width="1.5"/>
          <text x="24" y="47" text-anchor="middle" fill="white" font-size="9" font-weight="800" font-family="Poppins,Arial,sans-serif">6</text>
        </svg>
      </div>
      <label>Origineel (48px)</label>
    </div>
    <div class="col">

            <circle cx="12" cy="10" r="4" fill="white"/>

          <text x="24" y="47" text-anchor="middle" fill="white" font-size="9" font-weight="800" font-family="Poppins,Arial,sans-serif">6</text>
        </svg>
